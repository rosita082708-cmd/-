<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 File Unlock Challenge</title>
<style>
body{font-family:Arial,sans-serif;background:#dbeafe;margin:0;padding:30px}
.container{max-width:800px;margin:auto;background:#fff;border-radius:15px;padding:30px;box-shadow:0 0 15px rgba(0,0,0,.2)}
h1{text-align:center;color:#1565c0}
.center{text-align:center}
button{padding:10px 18px;font-size:16px;border:none;background:#1976d2;color:#fff;border-radius:8px;cursor:pointer}
button:hover{background:#0d47a1}
input[type=text],#password{width:95%;padding:10px;font-size:18px;box-sizing:border-box}
#password{max-width:220px;text-align:center;letter-spacing:8px}
.fileBox{margin-top:20px;border:1px solid #ccc;border-radius:10px;padding:20px;background:#f9f9f9}
.fileName{font-size:30px;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<h1>🔐 Unlock File Challenge</h1>
<div class="center">
<p>กรอกรหัสผ่าน 5 หลัก</p>
<input id="password" maxlength="5">
<br><br>
<button onclick="unlock()">ปลดล็อก</button>
</div>
<div id="result"></div>
</div>

<script>
const PASSWORD="48371";
const WEBAPP_URL="https://script.google.com/macros/s/AKfycbxipMx3dGPqzWdA3QI4bocj9xgRwet09CONz8GynCWpKYOvWmDfxw_lBg5fna3OVLq7/exec";

const files=[
"รายงานวิทยาศาสตร์.pdf","ใบงานที่1.docx","คะแนนปลายภาค.xlsx",
"Presentation_Final.pptx","ภาพกิจกรรม.jpg","Homework.docx",
"Resume.pdf","Holiday2025.mp4","เพลงเปิดงาน.mp3","Backup.zip",
"Project.rar","website.html","Python.py","Coding.java",
"budget.xlsx","invoice.pdf","certificate.pdf","book.pdf","cv.docx"
];

function unlock(){
  const pass=document.getElementById("password").value;
  if(pass!==PASSWORD){
    document.getElementById("result").innerHTML="<h2 style='color:red;text-align:center'>❌ รหัสไม่ถูกต้อง</h2>";
    return;
  }
  const randomFile=files[Math.floor(Math.random()*files.length)];
  document.getElementById("result").innerHTML=`
  <div class="fileBox">
    <h2>✅ ปลดล็อกสำเร็จ</h2>
    <div class="fileName">📁 ${randomFile}</div><hr>
    <label>ชื่อ-สกุล</label><br>
    <input type="text" id="student"><br><br>
    <label>ห้อง</label><br>
    <input type="text" id="room"><br><br>
    <label>1. ชื่อไฟล์</label><br>
    <input type="text" id="q1"><br><br>
    <label>2. นามสกุลไฟล์</label><br>
    <input type="text" id="q2"><br><br>
    <label>3. ประเภทไฟล์</label><br>
    <input type="text" id="q3"><br><br>
    <label>4. โปรแกรมที่ใช้เปิด</label><br>
    <input type="text" id="q4"><br><br>
    <button onclick="sendAnswer('${randomFile}')">📤 ส่งคำตอบ</button>
    <div id="status"></div>
  </div>`;
}

async function sendAnswer(randomFile){
  const data={
    student:document.getElementById("student").value,
    room:document.getElementById("room").value,
    randomFile,
    q1:document.getElementById("q1").value,
    q2:document.getElementById("q2").value,
    q3:document.getElementById("q3").value,
    q4:document.getElementById("q4").value,
    userAgent:navigator.userAgent
  };
  try{
    await fetch(WEBAPP_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });
    document.getElementById("status").innerHTML="<p style='color:green'>✅ ส่งข้อมูลเรียบร้อย</p>";
  }catch(e){
    document.getElementById("status").innerHTML="<p style='color:red'>❌ ส่งข้อมูลไม่สำเร็จ</p>";
  }
}
</script>
</body>
</html>
